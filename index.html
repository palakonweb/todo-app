<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="header-text">
                <h1>Focus Todo</h1>
                <p>What's on your mind today?</p>
            </div>
            <div class="stats">
                <span id="task-count">0 Tasks</span>
            </div>
        </header>

        <form id="todo-form" class="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off">
            <button type="submit" class="btn-add">
                <i data-lucide="plus"></i>
            </button>
        </form>

        <ul id="todo-list" class="todo-list">
            <!-- Tasks will be injected here -->
        </ul>
    </main>

    <!-- Focus Mode Overlay -->
    <div id="focus-overlay" class="focus-overlay hidden">
        <div class="focus-content">
            <h2 id="focus-task-title">Task Title</h2>
            <div class="focus-timer">
                <div class="time-display" id="time-display">25:00</div>
                <div class="timer-controls">
                    <button id="btn-start-timer" class="btn-focus-action">Start</button>
                    <button id="btn-stop-timer" class="btn-focus-action">Stop</button>
                </div>
            </div>
            <button id="btn-exit-focus" class="btn-exit">
                <i data-lucide="x"></i> Exit Focus
            </button>
        </div>
    </div>

    <!-- Script for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <!-- App Script -->
    <script src="script.js"></script>
</body>
</html>
